<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📚 Go DDD Docs Reader</title>
  <meta name="description" content="A beautiful documentation reader for Go Domain-Driven Design">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <!-- Overlay for mobile sidebar -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">📚</span>
        <div class="logo-text">
          <h1>Go DDD Docs</h1>
          <span class="logo-subtitle">Knowledge Base</span>
        </div>
      </div>
    </div>

    <div class="search-container">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Search docs..." autocomplete="off">
        <kbd class="search-shortcut" id="searchShortcut">⌘K</kbd>
      </div>
      <div class="search-results" id="searchResults"></div>
    </div>

    <nav class="nav-tree" id="navTree">
      <div class="nav-loading">
        <div class="spinner"></div>
        <span>Loading docs...</span>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="theme-toggle" id="themeToggle" title="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content" id="mainContent">
    <!-- Top bar -->
    <header class="topbar">
      <button class="hamburger" id="hamburger" aria-label="Toggle sidebar">
        <span></span><span></span><span></span>
      </button>
      <div class="breadcrumb" id="breadcrumb"></div>
      <div class="topbar-actions">
        <button class="btn-icon" id="btnScrollTop" title="Scroll to top">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
        </button>
      </div>
    </header>

    <!-- Content area -->
    <article class="content-area" id="contentArea">
      <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-icon">📖</div>
        <h2>Welcome to Go DDD Docs</h2>
        <p>Select a document from the sidebar to start reading</p>
        <div class="welcome-stats" id="welcomeStats"></div>
        <div class="quick-links" id="quickLinks"></div>
      </div>
      <div class="markdown-body hidden" id="markdownBody"></div>
    </article>
  </main>

  <!-- Reading progress (fixed overlay) -->
  <div class="reading-progress" id="readingProgress"></div>

  <!-- Table of Contents (right side) -->
  <aside class="toc-sidebar" id="tocSidebar">
    <div class="toc-header">
      <h3>On this page</h3>
    </div>
    <nav class="toc-nav" id="tocNav"></nav>
  </aside>

  <script src="/static/app.js"></script>
</body>
</html>
